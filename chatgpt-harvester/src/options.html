<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatGPT Conversation Harvester - Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #222;
      line-height: 1.5;
    }
    h1 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.25rem;
      font-size: 0.9rem;
    }
    input[type="text"],
    input[type="password"],
    input[type="time"] {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      box-sizing: border-box;
    }
    .auth-row {
      display: flex;
      gap: 0.5rem;
    }
    .auth-row input { flex: 1; }
    .auth-row button {
      white-space: nowrap;
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .conv-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      align-items: center;
    }
    .conv-row input { flex: 1; }
    .conv-row button {
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #add-conv {
      margin-top: 0.5rem;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #save {
      margin-top: 1.5rem;
      padding: 0.5rem 1.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
    #save:hover { background: #1d4ed8; }
    #status {
      display: inline-block;
      margin-left: 1rem;
      color: #16a34a;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #status.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>ChatGPT Conversation Harvester</h1>

  <label for="sink_url">Sink URL</label>
  <input type="text" id="sink_url" placeholder="https://ingest.example.com/chatgpt">

  <label for="sink_auth_header">Sink Auth Header</label>
  <div class="auth-row">
    <input type="password" id="sink_auth_header" placeholder="Bearer <token>">
    <button type="button" id="toggle-auth">Show</button>
  </div>

  <label for="schedule_local_time">Schedule Time</label>
  <input type="time" id="schedule_local_time">

  <label>Conversations</label>
  <div id="conv-list"></div>
  <button type="button" id="add-conv">+ Add conversation</button>

  <div>
    <button type="button" id="save">Save</button>
    <span id="status">Saved</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
