<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    margin: 0;
    padding: 12px;
    color: #1a1a1a;
  }
  h3 {
    margin: 0 0 8px 0;
    font-size: 14px;
  }
  .status-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-ok { background: #22c55e; }
  .dot-partial { background: #f59e0b; }
  .dot-auth_failure { background: #ef4444; }
  .dot-none { background: #9ca3af; }
  .next-run {
    color: #555;
    margin-bottom: 10px;
  }
  .conv-list {
    max-height: 160px;
    overflow-y: auto;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  .conv-list:empty {
    display: none;
  }
  .conv-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    border-bottom: 1px solid #f3f4f6;
    font-size: 12px;
  }
  .conv-item:last-child { border-bottom: none; }
  .conv-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    margin-right: 8px;
  }
  .status-ok { color: #22c55e; }
  .status-fetch_error, .status-sink_error { color: #f59e0b; }
  .status-auth_error { color: #ef4444; }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  button {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: #f9fafb; }
  button:disabled { opacity: 0.5; cursor: default; }
  #result {
    font-size: 12px;
    color: #555;
    min-height: 1em;
  }
</style>
</head>
<body>
  <h3>ChatGPT Harvester</h3>
  <div class="status-header">
    <span class="dot" id="statusDot"></span>
    <span id="lastRun">Loading...</span>
  </div>
  <div class="next-run" id="nextRun"></div>
  <div class="conv-list" id="convList"></div>
  <div class="btn-row">
    <button id="runBtn">Run Now</button>
    <button id="exportBtn">Export Log</button>
  </div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
